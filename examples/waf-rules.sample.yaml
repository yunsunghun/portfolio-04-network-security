# WAF 규칙 예시 — 데모랩 Lab (의사 스키마)
tenant: demolab
environment: lab
rules:
  - id: WF-9920
    name: block-env-leak
    match:
      path_prefix: ["/.env", "/.git"]
    action: deny
    severity: critical
  - id: WF-9921
    name: temp-block-bruteforce-range
    match:
      src_cidr: "198.51.100.0/27"
      path: "/auth/login"
    action: deny
    severity: high
    notes: "INC 브루트포스 대응 임시(가상)"
  - id: WF-8801
    name: rate-limit-bff
    match:
      path_prefix: ["/v1/orders"]
    action: rate_limit
    requests_per_minute: 600
